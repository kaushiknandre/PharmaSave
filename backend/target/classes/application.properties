spring.application.name=pharmasave

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pharmasave}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${SERVER_PORT:8080}

# PharmaSave SmartCart
pharmasave.jwt.secret=${PHARMASAVE_JWT_SECRET:change-this-local-development-secret-32chars}
pharmasave.jwt.expiration-minutes=${PHARMASAVE_JWT_EXPIRATION_MINUTES:480}
pharmasave.business-zone=${PHARMASAVE_BUSINESS_ZONE:UTC}
spring.jpa.open-in-view=false
